services:
  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./apps/backend/app:/app/app
      - ./apps/backend/alembic:/app/alembic
      - ./apps/backend/migrations:/app/migrations
      - ./apps/backend/alembic.ini:/app/alembic.ini
    depends_on:
      - db
      - redis
    networks:
      - sliceiq-network

  db:
    image: postgres:15
    ports:
      - "5433:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sliceiq}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sliceiq-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    env_file:
      - .env
    networks:
      - sliceiq-network

networks:
  sliceiq-network:
    driver: bridge

volumes:
  postgres_data:
